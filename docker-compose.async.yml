# =============================================================================
# Docker Compose — Doc Parser async services (OCR host)
#
# Single container that runs the combined API + UI + background worker.
# The in-memory JobStore is shared between all components in the same
# process.  For multi-container scaling, replace with a Redis-backed
# store and split into separate api/worker services.
#
# Usage:
#   docker compose -f docker-compose.async.yml up --build
#
# Endpoints:
#   http://localhost:8080/          — UI upload page
#   http://localhost:8080/jobs/{id} — UI job status (HTML)
#   http://localhost:8080/api/jobs  — API (JSON)
#
# Host requirements:
#   - amdgpu driver + ROCm installed
#   - User in video and render groups
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.async
    container_name: doc-parser-async
    ports:
      - "8080:8080"

    volumes:
      - uploads:/app/uploads
      - output:/app/output
      - doctr-cache:/root/.cache

    # AMD GPU access via ROCm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render

    # ROCm recommendations
    ipc: host
    security_opt:
      - seccomp=unconfined
    shm_size: "8g"

    env_file:
      - .env
    environment:
      - ENABLE_WORKER=true
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - PYTORCH_HIP_ALLOC_CONF=max_split_size_mb:512

    restart: unless-stopped

volumes:
  uploads:
  output:
  doctr-cache:
