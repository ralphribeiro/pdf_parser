# =============================================================================
# Docker Compose for Doc Parser API with ROCm (AMD GPU)
#
# Usage:
#   docker compose up --build
#   curl -X POST http://localhost:8000/process -F "file=@document.pdf"
#
# Host requirements:
#   - amdgpu driver + ROCm installed
#   - User in video and render groups
# =============================================================================

services:
  redis:
    image: "redis:7-alpine"
    container_name: doc-parser-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  mongodb:
    image: "mongo:7.0"
    container_name: doc-parser-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
      - MONGO_INITDB_DATABASE=caseiro_docs
    volumes:
      - mongodb-data:/data/db
    restart: unless-stopped

  doc-parser:
    build: .
    container_name: doc-parser-api
    ports:
      - "8000:8000"

    # Volumes
    volumes:
      - ./output:/app/output
      # Persist doctr/torch model cache so models aren't re-downloaded on restart
      - doctr-cache:/root/.cache

    # AMD GPU access via ROCm
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render

    # ROCm recommendations (AMD quick-start)
    ipc: host
    security_opt:
      - seccomp=unconfined
    shm_size: "8g"

    # Environment variables
    env_file:
      - .env
    environment:
      # gfx1100 = RDNA3 (RX 7900 XT) — safety net for ROCm < 7.2
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      # PyTorch memory allocation optimization
      - PYTORCH_HIP_ALLOC_CONF=max_split_size_mb:512

    restart: unless-stopped

  # =============================================================================
  # Celery Services
  # =============================================================================

  celery-worker:
    build: .
    container_name: doc-parser-celery-worker
    command: celery -A src.celery_worker worker --loglevel=info --concurrency=2 --pool=solo --without-gossip --without-mingle --without-heartbeat
    environment:
      - DOC_PARSER_CELERY_BROKER_URL=redis://redis:6379/0
      - DOC_PARSER_CELERY_RESULT_BACKEND=redis://redis:6379/0
      - C_FORCE_ROOT=true
    volumes:
      - .:/app
    depends_on:
      - redis
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: doc-parser-celery-beat
    command: celery -A src.celery_worker beat --max-interval=300
    environment:
      - DOC_PARSER_CELERY_BROKER_URL=redis://redis:6379/0
      - DOC_PARSER_CELERY_RESULT_BACKEND=redis://redis:6379/0
      - C_FORCE_ROOT=true
    volumes:
      - .:/app
    depends_on:
      - redis
    restart: unless-stopped

# Named volumes
volumes:
  doctr-cache:
  redis-data:
  mongodb-data:
